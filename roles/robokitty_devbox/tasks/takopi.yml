---
- name: Download uv installer
  ansible.builtin.get_url:
    url: "{{ robokitty_uv_installer_url }}"
    dest: /tmp/robokitty-uv-install.sh
    owner: root
    group: root
    mode: "0755"
    checksum: "{{ robokitty_uv_installer_checksum if (robokitty_uv_installer_checksum | trim | length > 0) else omit }}"

- name: Install uv as bridge user
  ansible.builtin.command: /tmp/robokitty-uv-install.sh
  args:
    creates: "/home/{{ robokitty_bridge_user }}/.local/bin/uv"
  become: true
  become_user: "{{ robokitty_bridge_user }}"
  environment:
    HOME: "/home/{{ robokitty_bridge_user }}"
    UV_NO_MODIFY_PATH: "1"

- name: Install Takopi Python runtime
  ansible.builtin.command: "/home/{{ robokitty_bridge_user }}/.local/bin/uv python install {{ robokitty_takopi_uv_python }}"
  become: true
  become_user: "{{ robokitty_bridge_user }}"
  changed_when: false
  environment:
    HOME: "/home/{{ robokitty_bridge_user }}"
    PATH: "/home/{{ robokitty_bridge_user }}/.local/bin:/usr/local/bin:/usr/bin:/bin"

- name: Install Takopi as bridge user
  ansible.builtin.command: "/home/{{ robokitty_bridge_user }}/.local/bin/uv tool install {{ robokitty_takopi_package }}"
  args:
    creates: "/home/{{ robokitty_bridge_user }}/.local/bin/takopi"
  become: true
  become_user: "{{ robokitty_bridge_user }}"
  environment:
    HOME: "/home/{{ robokitty_bridge_user }}"
    PATH: "/home/{{ robokitty_bridge_user }}/.local/bin:/usr/local/bin:/usr/bin:/bin"

- name: Render Takopi config
  ansible.builtin.template:
    src: takopi.toml.j2
    dest: "/home/{{ robokitty_bridge_user }}/.takopi/takopi.toml"
    owner: "{{ robokitty_bridge_user }}"
    group: "{{ robokitty_bridge_user }}"
    mode: "0600"
  no_log: true
  notify: Restart takopi

- name: Install Codex wrapper
  ansible.builtin.template:
    src: codex-wrapper.sh.j2
    dest: "{{ robokitty_wrappers_dir }}/codex"
    owner: root
    group: root
    mode: "0755"

- name: Install Takopi systemd unit
  ansible.builtin.template:
    src: takopi.service.j2
    dest: /etc/systemd/system/takopi.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart takopi

- name: Enable/start Takopi when configured
  ansible.builtin.service:
    name: takopi
    enabled: "{{ robokitty_enable_takopi_service | bool }}"
    state: "{{ 'started' if (robokitty_start_takopi_service | bool and robokitty_takopi_bot_token | length > 0 and robokitty_takopi_chat_id is not none and robokitty_takopi_allowed_user_ids | length > 0) else 'stopped' }}"
