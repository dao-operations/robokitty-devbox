---
- name: Create work group
  ansible.builtin.group:
    name: "{{ robokitty_work_group }}"
    state: present

- name: Create bridge user
  ansible.builtin.user:
    name: "{{ robokitty_bridge_user }}"
    shell: /bin/bash
    create_home: true
    home: "/home/{{ robokitty_bridge_user }}"

- name: Create runner user
  ansible.builtin.user:
    name: "{{ robokitty_runner_user }}"
    shell: /bin/bash
    create_home: true
    home: "/home/{{ robokitty_runner_user }}"
    groups: "{{ robokitty_work_group }}"
    append: true

- name: Create GitHub broker user
  ansible.builtin.user:
    name: "{{ robokitty_git_user }}"
    shell: /usr/sbin/nologin
    create_home: true
    home: "/home/{{ robokitty_git_user }}"

- name: Ensure GitHub broker user has no supplementary groups
  ansible.builtin.user:
    name: "{{ robokitty_git_user }}"
    groups: ""
    append: false

- name: Harden GitHub broker home directory
  ansible.builtin.file:
    path: "/home/{{ robokitty_git_user }}"
    state: directory
    owner: "{{ robokitty_git_user }}"
    group: "{{ robokitty_git_user }}"
    mode: "0700"

- name: Create Actions runner user
  ansible.builtin.user:
    name: "{{ robokitty_actions_runner_user }}"
    shell: /bin/bash
    create_home: true
    home: "{{ robokitty_actions_runner_home }}"
    groups: ""
    append: false
  when: robokitty_deploy_runner_enabled | bool

- name: Harden Actions runner home directory
  ansible.builtin.file:
    path: "{{ robokitty_actions_runner_home }}"
    state: directory
    owner: "{{ robokitty_actions_runner_user }}"
    group: "{{ robokitty_actions_runner_user }}"
    mode: "0700"
  when: robokitty_deploy_runner_enabled | bool

- name: Create deploy secret user
  ansible.builtin.user:
    name: "{{ robokitty_deploy_runner_user }}"
    shell: /bin/bash
    create_home: true
    home: "{{ robokitty_deploy_runner_home }}"
    groups: ""
    append: false
  when: robokitty_deploy_runner_enabled | bool

- name: Harden deploy runner home directory
  ansible.builtin.file:
    path: "{{ robokitty_deploy_runner_home }}"
    state: directory
    owner: "{{ robokitty_deploy_runner_user }}"
    group: "{{ robokitty_deploy_runner_user }}"
    mode: "0700"
  when: robokitty_deploy_runner_enabled | bool

- name: Create root directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - path: "{{ robokitty_root }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ robokitty_workdir }}"
      owner: "{{ robokitty_runner_user }}"
      group: "{{ robokitty_work_group }}"
      mode: "2775"
    - path: "{{ robokitty_live_dir }}"
      owner: "{{ robokitty_runner_user }}"
      group: "{{ robokitty_work_group }}"
      mode: "2775"
    - path: "{{ robokitty_infra_dir }}"
      owner: "{{ robokitty_runner_user }}"
      group: "{{ robokitty_work_group }}"
      mode: "2775"
    - path: "{{ robokitty_config_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ robokitty_state_dir }}"
      owner: root
      group: "{{ robokitty_github_broker_handoff_group }}"
      mode: "0750"
    - path: "{{ robokitty_worktree_source_dir }}"
      owner: "{{ robokitty_runner_user }}"
      group: "{{ robokitty_work_group }}"
      mode: "2775"
    - path: "{{ robokitty_libdir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "{{ robokitty_wrappers_dir }}"
      owner: root
      group: root
      mode: "0755"
    - path: "/home/{{ robokitty_bridge_user }}/.takopi"
      owner: "{{ robokitty_bridge_user }}"
      group: "{{ robokitty_bridge_user }}"
      mode: "0700"
    - path: "/home/{{ robokitty_runner_user }}/.codex"
      owner: "{{ robokitty_runner_user }}"
      group: "{{ robokitty_runner_user }}"
      mode: "0700"
    - path: "/home/{{ robokitty_git_user }}/.config/robokitty-devbox"
      owner: "{{ robokitty_git_user }}"
      group: "{{ robokitty_git_user }}"
      mode: "0700"
    - path: "/home/{{ robokitty_git_user }}/.cache"
      owner: "{{ robokitty_git_user }}"
      group: "{{ robokitty_git_user }}"
      mode: "0700"
    - path: "/home/{{ robokitty_git_user }}/.cache/robokitty-devbox"
      owner: "{{ robokitty_git_user }}"
      group: "{{ robokitty_git_user }}"
      mode: "0700"
