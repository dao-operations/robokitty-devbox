---
- name: Download Codex installer
  ansible.builtin.get_url:
    url: "{{ robokitty_codex_installer_url }}"
    dest: /tmp/robokitty-codex-install.sh
    owner: root
    group: root
    mode: "0755"
    checksum: >-
      {{ robokitty_codex_installer_checksum
      if (robokitty_codex_installer_checksum | trim | length > 0)
      else omit }}

- name: Create system Codex config directory
  ansible.builtin.file:
    path: "{{ robokitty_codex_requirements_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Install Codex as runner user
  ansible.builtin.command: /tmp/robokitty-codex-install.sh
  args:
    creates: "{{ robokitty_codex_binary }}"
  become: true
  become_user: "{{ robokitty_runner_user }}"
  environment:
    CODEX_NON_INTERACTIVE: "1"
    HOME: "/home/{{ robokitty_runner_user }}"
    PATH: >-
      {{
        [
          '/home/' ~ robokitty_runner_user ~ '/.local/bin',
          '/home/' ~ robokitty_runner_user ~ '/bin',
          '/usr/local/bin',
          '/usr/bin',
          '/bin'
        ] | join(':')
      }}

- name: Render Codex managed requirements
  ansible.builtin.template:
    src: codex-requirements.toml.j2
    dest: "{{ robokitty_codex_requirements_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render system Codex config
  ansible.builtin.template:
    src: codex-system-config.toml.j2
    dest: "{{ robokitty_codex_system_config_file }}"
    owner: root
    group: root
    mode: "0644"

- name: Render Codex config
  ansible.builtin.template:
    src: codex-config.toml.j2
    dest: "/home/{{ robokitty_runner_user }}/.codex/config.toml"
    owner: "{{ robokitty_runner_user }}"
    group: "{{ robokitty_runner_user }}"
    mode: "0600"

- name: Remove legacy githubctl Codex exec rule
  ansible.builtin.file:
    path: "{{ robokitty_codex_requirements_dir }}/rules/robokitty-githubctl.rules"
    state: absent

- name: Ensure runner PATH includes local bins
  ansible.builtin.blockinfile:
    path: "/home/{{ robokitty_runner_user }}/.profile"
    marker: "# {mark} ROBOKITTY CODEX PATH"
    block: |
      export PATH="$HOME/.local/bin:$HOME/bin:/usr/local/bin:$PATH"
    create: true
    owner: "{{ robokitty_runner_user }}"
    group: "{{ robokitty_runner_user }}"
    mode: "0644"
