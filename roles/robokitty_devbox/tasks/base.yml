---
- name: Install base packages
  ansible.builtin.apt:
    name: "{{ robokitty_packages }}"
    state: present
    update_cache: true

- name: Enable unattended upgrades
  ansible.builtin.service:
    name: unattended-upgrades
    enabled: true
    state: started

- name: Enable corepack if requested
  ansible.builtin.command: corepack enable
  changed_when: false
  failed_when: false
  when: robokitty_enable_corepack | bool

